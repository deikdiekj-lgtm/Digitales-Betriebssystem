<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Diekjobst · Mitarbeiter</title>
<style>
:root{
  --navy:#1e3a5f;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
  --white:#fff;--bg:#f1f5f9;--line:#e2e8f0;--muted:#64748b;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--navy);min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 20px 24px}
.login-logo{width:60px;height:60px;background:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 4px 14px rgba(30,58,95,.22)}
.login-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;text-align:center;line-height:1.5}
.step-label{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.ma-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin-bottom:8px}
.ma-btn{padding:18px 12px;border:2px solid var(--line);border-radius:var(--r);background:var(--white);cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:700;color:var(--navy);text-align:center;transition:all .15s;line-height:1.3}
.ma-btn:hover{border-color:var(--navy);background:#f8fafc}
.ma-btn.sel{border-color:var(--navy);background:var(--navy);color:var(--white)}

/* PIN */
#pinSection{display:none;flex-direction:column;align-items:center;width:100%;max-width:272px}
.pin-name{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:18px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:26px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2.5px solid var(--line);transition:all .15s}
.pin-dot.on{background:var(--navy);border-color:var(--navy)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.pk{padding:17px;border:none;border-radius:var(--r);background:var(--white);box-shadow:0 1px 3px rgba(0,0,0,.09);font-family:var(--sans);font-size:20px;font-weight:600;color:var(--navy);cursor:pointer;text-align:center;transition:background .08s,transform .07s;user-select:none}
.pk:active{background:var(--navy);color:var(--white);transform:scale(.91)}
.pk.sm{font-size:13px;color:var(--muted)}
.pin-cancel{background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:12px;cursor:pointer;padding:12px;margin-top:4px}
.pin-err{color:var(--red);font-size:12.5px;font-weight:600;margin-top:12px;text-align:center;display:none}

/* APP */
#appScreen{display:none;flex-direction:column;min-height:100vh}
.app-hdr{background:var(--navy);padding:15px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.app-hdr-name{font-size:16px;font-weight:700;color:#fff}
.app-hdr-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.app-logout-btn{background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:6px;padding:6px 12px;font-family:var(--sans);font-size:12px;cursor:pointer}
.tab-bar{background:var(--white);border-bottom:1px solid var(--line);display:flex;position:sticky;top:56px;z-index:9}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-family:var(--sans);font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab-btn svg{width:18px;height:18px;stroke-width:2;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round}
.tab-btn.on{color:var(--navy);border-bottom-color:var(--navy)}
.app-body{padding:14px;max-width:560px;width:100%;margin:0 auto}

/* CARDS */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.card-hdr .count{color:var(--navy);font-size:13px}

/* AUFGABEN */
.task{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.task:last-child{border-bottom:none;padding-bottom:0}
.task-cb{width:22px;height:22px;border:2px solid var(--line);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;background:var(--white)}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-title{font-size:13.5px;font-weight:600;color:var(--navy)}
.task-title.done{text-decoration:line-through;color:var(--muted);font-weight:400}
.task-desc{font-size:12px;color:var(--muted);margin-top:2px}
.prio{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;margin-top:4px}
.p-hoch{background:#fee2e2;color:#b91c1c}
.p-normal{background:#dbeafe;color:#1d4ed8}
.p-niedrig{background:#dcfce7;color:#15803d}
.done-info{font-size:10.5px;color:var(--muted);margin-top:3px}

/* WOCHENZETTEL */
.wk-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.wk-nav-btn{background:var(--white);border:1.5px solid var(--line);border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:18px;color:var(--navy);display:flex;align-items:center;justify-content:center;transition:border-color .1s}
.wk-nav-btn:disabled{opacity:.3;cursor:default}
.wk-lbl{font-size:13px;font-weight:700;color:var(--navy);text-align:center}
.wk-sub{font-size:11px;color:var(--muted);text-align:center;margin-top:2px}
.day-row{display:grid;grid-template-columns:42px 72px 1fr;gap:8px;align-items:start;margin-bottom:10px}
.day-lbl{font-size:12.5px;font-weight:700;color:var(--navy);padding-top:8px;line-height:1}
.day-date{font-size:9.5px;color:var(--muted);margin-top:2px}
.day-std{border:1.5px solid var(--line);border-radius:7px;padding:7px;font-family:var(--sans);font-size:13px;color:var(--navy);text-align:center;width:100%;outline:none;background:var(--white)}
.day-std:focus{border-color:var(--navy)}
.day-bem{border:1.5px solid var(--line);border-radius:7px;padding:7px 9px;font-family:var(--sans);font-size:12px;color:var(--navy);width:100%;outline:none;background:var(--white);transition:border-color .12s}
.day-bem:focus{border-color:var(--navy)}
.day-std[readonly],.day-bem[readonly]{background:var(--bg);color:var(--muted);cursor:default;border-color:var(--line)}
.wk-total{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:7px;margin:14px 0}
.wk-total-lbl{font-size:12px;font-weight:600;color:var(--muted)}
.wk-total-val{font-size:17px;font-weight:700;color:var(--navy)}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10.5px;font-weight:700}
.b-entwurf{background:#f1f5f9;color:#64748b}
.b-eingereicht{background:#dcfce7;color:#15803d}
.b-beantragt{background:#fef9c3;color:#854d0e}
.b-genehmigt{background:#dcfce7;color:#15803d}
.b-abgelehnt{background:#fee2e2;color:#b91c1c}

/* URLAUB */
.uk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.uk-item{background:var(--bg);border-radius:8px;padding:10px 6px;text-align:center}
.uk-val{font-size:22px;font-weight:700;color:var(--navy)}
.uk-lbl{font-size:9.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.form-row{margin-bottom:12px}
.form-lbl{font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
.form-inp{border:1.5px solid var(--line);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:13.5px;color:var(--navy);width:100%;outline:none;background:var(--white);transition:border-color .12s}
.form-inp:focus{border-color:var(--navy)}
textarea.form-inp{resize:vertical;min-height:70px}
.arb-hint{font-size:12px;font-weight:600;padding:7px 11px;border-radius:6px;margin-top:6px;display:none}
.arb-hint.ok{color:#166534;background:#dcfce7}
.arb-hint.err{color:var(--red);background:#fee2e2}
.ur-row{padding:11px 0;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ur-row:last-child{border-bottom:none}
.ur-dates{font-size:13px;font-weight:600;color:var(--navy)}
.ur-tage{font-size:11.5px;color:var(--muted);margin-top:1px}
.ur-notiz{font-size:11.5px;color:var(--muted);margin-top:2px;font-style:italic}

/* BUTTONS */
.btn-main{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:13px 20px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s}
.btn-main:hover{opacity:.88}
.btn-main:disabled{opacity:.38;cursor:not-allowed}
.btn-sec{background:transparent;color:var(--navy);border:1.5px solid var(--line);border-radius:8px;padding:11px 16px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:border-color .12s;white-space:nowrap}
.btn-sec:hover{border-color:var(--navy)}
.btn-row{display:flex;gap:8px}

/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;font-style:italic}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:#1e3a5f;color:#fff;padding:11px 22px;border-radius:9px;font-size:13px;font-weight:600;opacity:0;transition:all .22s;z-index:999;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* WZ HISTORY */
.wz-hist-item{padding:10px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.wz-hist-item:last-child{border-bottom:none}
</style>
</head>
<body>

<!-- ─── LOGIN ─────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <div class="login-title">Diekjobst — Tappendorf</div>
  <div class="login-sub">Mitarbeiter-Portal<br>Bitte Name auswählen und PIN eingeben</div>

  <div class="step-label" id="stepLabel">Wer bist du?</div>
  <div class="ma-grid" id="maGrid"><div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:20px">Lade…</div></div>

  <div id="pinSection">
    <div class="pin-name" id="pinName"></div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pk" onclick="pk('1')">1</button>
      <button class="pk" onclick="pk('2')">2</button>
      <button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button>
      <button class="pk" onclick="pk('5')">5</button>
      <button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button>
      <button class="pk" onclick="pk('8')">8</button>
      <button class="pk" onclick="pk('9')">9</button>
      <button class="pk sm" onclick="pkCancel()">← zurück</button>
      <button class="pk" onclick="pk('0')">0</button>
      <button class="pk sm" onclick="pkDel()">⌫</button>
    </div>
    <div class="pin-err" id="pinErr">Falscher PIN — bitte erneut versuchen</div>
  </div>
</div>

<!-- ─── APP ──────────────────────────────────────────── -->
<div id="appScreen">
  <div class="app-hdr">
    <div>
      <div class="app-hdr-name" id="appName"></div>
      <div class="app-hdr-sub" id="appSub"></div>
    </div>
    <button class="app-logout-btn" onclick="logout()">Abmelden</button>
  </div>
  <div class="tab-bar">
    <button class="tab-btn on" data-t="aufgaben" onclick="switchTab('aufgaben')">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Aufgaben
    </button>
    <button class="tab-btn" data-t="wochenzettel" onclick="switchTab('wochenzettel')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Wochenzettel
    </button>
    <button class="tab-btn" data-t="urlaub" onclick="switchTab('urlaub')">
      <svg viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
      Urlaub
    </button>
  </div>
  <div class="app-body">
    <div id="tabAufgaben"></div>
    <div id="tabWochenzettel" style="display:none"></div>
    <div id="tabUrlaub" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const _URL='https://tsqfzmhfkkuxwftpljsv.supabase.co';
const _KEY='sb_publishable_oDrA0qJ2tHdKi9t4JX8OeQ_-5WZeAAh';
const _sb=supabase.createClient(_URL,_KEY);

let _ma=null,_maList=[],_selId=null,_pinBuf='';
let _aufgaben=[],_wzCache=[],_wocheOff=0,_urlaubList=[],_einst={};
let _curTab='aufgaben';

// ─── INIT ────────────────────────────────────────────────
async function init(){
  const saved=sessionStorage.getItem('diekjobst_ma');
  if(saved){try{_ma=JSON.parse(saved);}catch(e){}}
  if(_ma){await loadData();showApp();return;}
  const{data,error}=await _sb.from('mitarbeiter').select('*').eq('aktiv',true).order('name');
  _maList=data||[];
  renderMaBtns();
}

function renderMaBtns(){
  const g=document.getElementById('maGrid');
  if(!_maList.length){
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:20px">Keine Mitarbeiter hinterlegt.<br>Bitte im Management anlegen.</div>';
    return;
  }
  g.innerHTML=_maList.map(m=>`<button class="ma-btn" onclick="selMa('${m.id}')">${esc(m.name)}</button>`).join('');
}

function selMa(id){
  _selId=id;_pinBuf='';
  const m=_maList.find(x=>x.id===id);
  document.querySelectorAll('.ma-btn').forEach(b=>b.classList.toggle('sel',b.textContent===m.name));
  document.getElementById('pinName').textContent='PIN für '+m.name;
  document.getElementById('pinSection').style.display='flex';
  document.getElementById('stepLabel').textContent='PIN eingeben';
  document.getElementById('pinErr').style.display='none';
  updDots();
}

function pk(d){
  if(_pinBuf.length>=4)return;
  _pinBuf+=d;updDots();
  if(_pinBuf.length===4)checkPin();
}
function pkDel(){_pinBuf=_pinBuf.slice(0,-1);updDots();}
function pkCancel(){
  _selId=null;_pinBuf='';
  document.getElementById('pinSection').style.display='none';
  document.getElementById('stepLabel').textContent='Wer bist du?';
  document.querySelectorAll('.ma-btn').forEach(b=>b.classList.remove('sel'));
  updDots();
}
function updDots(){
  for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.className='pin-dot'+(i<_pinBuf.length?' on':'');}
}

async function checkPin(){
  const m=_maList.find(x=>x.id===_selId);
  if(!m)return;
  if(_pinBuf===m.pin){
    _ma=m;
    sessionStorage.setItem('diekjobst_ma',JSON.stringify(m));
    await loadData();
    showApp();
  } else {
    _pinBuf='';updDots();
    const e=document.getElementById('pinErr');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',2200);
  }
}

// ─── DATA ────────────────────────────────────────────────
async function loadData(){
  const[{data:af},{data:wz},{data:ul},{data:es}]=await Promise.all([
    _sb.from('aufgaben').select('*').order('created_at',{ascending:false}),
    _sb.from('wochenzettel').select('*').eq('mitarbeiter_id',_ma.id).order('woche_start',{ascending:false}),
    _sb.from('urlaub').select('*').eq('mitarbeiter_id',_ma.id).order('created_at',{ascending:false}),
    _sb.from('einstellungen').select('*')
  ]);
  _aufgaben=af||[];_wzCache=wz||[];_urlaubList=ul||[];
  _einst={};(es||[]).forEach(e=>{_einst[e.key]=e.value;});
}

// ─── APP ─────────────────────────────────────────────────
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  const app=document.getElementById('appScreen');
  app.style.display='flex';
  document.getElementById('appName').textContent='Hallo, '+(_ma.name.split(' ')[0])+' 👋';
  document.getElementById('appSub').textContent=fmtDate(new Date().toISOString().slice(0,10))+' · Tappendorf';
  renderTab(_curTab);
}

function logout(){
  sessionStorage.removeItem('diekjobst_ma');
  _ma=null;_pinBuf='';_selId=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  pkCancel();init();
}

function switchTab(t){
  _curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  ['aufgaben','wochenzettel','urlaub'].forEach(n=>{
    const cap=n.charAt(0).toUpperCase()+n.slice(1);
    document.getElementById('tab'+cap).style.display=n===t?'block':'none';
  });
  renderTab(t);
}

function renderTab(t){
  if(t==='aufgaben')renderAufgaben();
  else if(t==='wochenzettel')renderWochenzettel();
  else if(t==='urlaub')renderUrlaub();
}

// ─── AUFGABEN ────────────────────────────────────────────
function renderAufgaben(){
  const open=_aufgaben.filter(a=>a.status==='offen');
  const done=_aufgaben.filter(a=>a.status==='erledigt');
  const prioBadge=p=>{const m={hoch:'p-hoch',normal:'p-normal',niedrig:'p-niedrig'};return`<span class="prio ${m[p]||'p-normal'}">${p||'normal'}</span>`;};
  const checkIcon=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const taskRow=(a,isDone)=>`
    <div class="task">
      <div class="task-cb${isDone?' done':''}" onclick="toggleTask('${a.id}')">${isDone?checkIcon:''}</div>
      <div style="flex:1;min-width:0">
        <div class="task-title${isDone?' done':''}">${esc(a.titel)}</div>
        ${a.beschreibung?`<div class="task-desc">${esc(a.beschreibung)}</div>`:''}
        ${!isDone?prioBadge(a.prioritaet):''}
        ${isDone&&a.erledigt_von?`<div class="done-info">Erledigt am ${fmtDate(a.erledigt_am?.slice(0,10))} · ${esc(a.erledigt_von)}</div>`:''}
      </div>
    </div>`;
  let h='';
  if(open.length){
    h+=`<div class="card"><div class="card-hdr">Offene Aufgaben <span class="count">${open.length}</span></div>${open.map(a=>taskRow(a,false)).join('')}</div>`;
  } else {
    h+=`<div class="card"><div class="card-hdr">Offene Aufgaben <span class="count">0</span></div><div class="empty">Keine offenen Aufgaben — weiter so! 🎉</div></div>`;
  }
  if(done.length){
    const show=done.slice(0,5);
    h+=`<div class="card"><div class="card-hdr">Erledigt <span class="count">${done.length}</span></div>${show.map(a=>taskRow(a,true)).join('')}${done.length>5?`<div style="text-align:center;padding-top:8px;font-size:12px;color:var(--muted)">+ ${done.length-5} weitere</div>`:''}</div>`;
  }
  document.getElementById('tabAufgaben').innerHTML=h;
}

async function toggleTask(id){
  const a=_aufgaben.find(x=>x.id===id);
  if(!a||a.status==='erledigt'){if(a?.status==='erledigt')toast('Bereits erledigt');return;}
  const now=new Date().toISOString();
  const{error}=await _sb.from('aufgaben').update({status:'erledigt',erledigt_von:_ma.name,erledigt_am:now}).eq('id',id);
  if(error){toast('Fehler: '+error.message);return;}
  a.status='erledigt';a.erledigt_von=_ma.name;a.erledigt_am=now;
  renderAufgaben();toast('Aufgabe erledigt ✓');
}

// ─── WOCHENZETTEL ────────────────────────────────────────
function getMonday(off=0){
  const n=new Date(),day=n.getDay()||7,m=new Date(n);
  m.setDate(n.getDate()-(day-1)+off*7);m.setHours(0,0,0,0);return m;
}
function getKW(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);
  const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt-ys)/86400000)+1)/7);
}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function fmtShort(d){return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;}

function renderWochenzettel(){
  const mon=getMonday(_wocheOff);
  const sun=new Date(mon.getTime()+6*86400000);
  const kw=getKW(mon),year=mon.getFullYear();
  const monStr=mon.toISOString().slice(0,10);
  let sheet=_wzCache.find(w=>w.woche_start===monStr)||{
    mitarbeiter_id:_ma.id,woche_start:monStr,kw,jahr:year,
    mo_std:0,di_std:0,mi_std:0,do_std:0,fr_std:0,sa_std:0,
    mo_bem:'',di_bem:'',mi_bem:'',do_bem:'',fr_bem:'',sa_bem:'',status:'entwurf'
  };
  const locked=sheet.status==='eingereicht';
  const days=[
    {k:'mo',l:'Mo',d:mon},
    {k:'di',l:'Di',d:new Date(mon.getTime()+86400000)},
    {k:'mi',l:'Mi',d:new Date(mon.getTime()+2*86400000)},
    {k:'do',l:'Do',d:new Date(mon.getTime()+3*86400000)},
    {k:'fr',l:'Fr',d:new Date(mon.getTime()+4*86400000)},
    {k:'sa',l:'Sa',d:new Date(mon.getTime()+5*86400000)},
  ];
  const total=days.reduce((s,d)=>s+(parseFloat(sheet[d.k+'_std'])||0),0);
  const badgeHtml=locked?`<span class="badge b-eingereicht">✓ Eingereicht</span>`:`<span class="badge b-entwurf">Entwurf</span>`;
  const daysHtml=days.map(({k,l,d})=>`
    <div class="day-row">
      <div class="day-lbl">${l}<div class="day-date">${fmtShort(d)}</div></div>
      <input type="number" class="day-std" id="wz_${k}_std" value="${parseFloat(sheet[k+'_std'])||0}" min="0" max="24" step="0.5" ${locked?'readonly':''} oninput="updTotal()">
      <input type="text" class="day-bem" id="wz_${k}_bem" value="${esc(sheet[k+'_bem']||'')}" placeholder="Bemerkung…" ${locked?'readonly':''}>
    </div>`).join('');

  const histItems=_wzCache.filter(w=>w.status==='eingereicht'&&w.woche_start!==monStr).slice(0,6).map(w=>{
    const t=days.map(d=>d.k).reduce((s,k)=>s+(parseFloat(w[k+'_std'])||0),0);
    return`<div class="wz-hist-item">
      <div><div style="font-size:13px;font-weight:600;color:var(--navy)">KW ${w.kw} · ${w.jahr}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:1px">${fmtDate(w.woche_start)}</div></div>
      <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--navy)">${t.toFixed(1).replace('.',',')} Std</div><span class="badge b-eingereicht">Eingereicht</span></div>
    </div>`;}).join('');

  document.getElementById('tabWochenzettel').innerHTML=`
    <div class="card">
      <div class="wk-nav">
        <button class="wk-nav-btn" onclick="navWoche(-1)">‹</button>
        <div>
          <div class="wk-lbl">KW ${kw} · ${year} &nbsp;${badgeHtml}</div>
          <div class="wk-sub">${fmtShort(mon)} – ${fmtShort(sun)}${year}</div>
        </div>
        <button class="wk-nav-btn" onclick="navWoche(1)" ${_wocheOff>=0?'disabled':''}>›</button>
      </div>
      ${daysHtml}
      <div class="wk-total">
        <div class="wk-total-lbl">Gesamtstunden</div>
        <div class="wk-total-val" id="wkTotal">${total.toFixed(1).replace('.',',')} Std</div>
      </div>
      ${!locked?`
        <div class="btn-row">
          <button class="btn-sec" style="flex:1" onclick="saveWz(false)">Speichern</button>
          <button class="btn-main" style="flex:2" onclick="saveWz(true)">Einreichen ✓</button>
        </div>
      `:`<div style="text-align:center;font-size:12px;color:var(--muted);padding:6px">Eingereicht am ${fmtDate(sheet.submitted_at?.slice(0,10))} — schreibgeschützt.</div>`}
    </div>
    ${histItems?`<div class="card"><div class="card-hdr">Eingereichte Wochen</div>${histItems}</div>`:''}`;
}

function updTotal(){
  const keys=['mo','di','mi','do','fr','sa'];
  const t=keys.reduce((s,k)=>s+(parseFloat(document.getElementById('wz_'+k+'_std')?.value)||0),0);
  const el=document.getElementById('wkTotal');if(el)el.textContent=t.toFixed(1).replace('.',',')+' Std';
}

async function saveWz(submit){
  const mon=getMonday(_wocheOff);
  const monStr=mon.toISOString().slice(0,10);
  const keys=['mo','di','mi','do','fr','sa'];
  const data={mitarbeiter_id:_ma.id,woche_start:monStr,kw:getKW(mon),jahr:mon.getFullYear(),status:submit?'eingereicht':'entwurf'};
  if(submit)data.submitted_at=new Date().toISOString();
  keys.forEach(k=>{
    data[k+'_std']=parseFloat(document.getElementById('wz_'+k+'_std')?.value)||0;
    data[k+'_bem']=document.getElementById('wz_'+k+'_bem')?.value||'';
  });
  const{data:res,error}=await _sb.from('wochenzettel').upsert(data,{onConflict:'mitarbeiter_id,woche_start'}).select().single();
  if(error){toast('Fehler: '+error.message);return;}
  const idx=_wzCache.findIndex(w=>w.woche_start===monStr);
  if(idx>=0)_wzCache[idx]=res;else _wzCache.unshift(res);
  toast(submit?'Wochenzettel eingereicht ✓':'Entwurf gespeichert');
  renderWochenzettel();
}

function navWoche(d){if(_wocheOff+d>0)return;_wocheOff+=d;renderWochenzettel();}

// ─── URLAUB ──────────────────────────────────────────────
function calcAT(von,bis){
  if(!von||!bis)return 0;
  const s=new Date(von+'T00:00:00'),e=new Date(bis+'T00:00:00');
  if(e<s)return 0;
  let c=0,cur=new Date(s);
  while(cur<=e){const d=cur.getDay();if(d!==0&&d!==6)c++;cur.setDate(cur.getDate()+1);}
  return c;
}

function renderUrlaub(){
  const yr=new Date().getFullYear();
  const genommen=_urlaubList.filter(u=>u.status==='genehmigt'&&u.jahr===yr).reduce((s,u)=>s+(u.arbeitstage||0),0);
  const anspruch=_ma.urlaub_anspruch||24;
  const vorjahr=_ma.urlaub_vorjahr||0;
  const offen=anspruch+vorjahr-genommen;
  const statusMap={beantragt:'Beantragt',genehmigt:'Genehmigt',abgelehnt:'Abgelehnt'};
  document.getElementById('tabUrlaub').innerHTML=`
    <div class="card">
      <div class="card-hdr">Urlaubskonto ${yr}</div>
      <div class="uk-grid">
        <div class="uk-item"><div class="uk-val">${anspruch}</div><div class="uk-lbl">Jahres­anspruch</div></div>
        <div class="uk-item"><div class="uk-val">${vorjahr}</div><div class="uk-lbl">Aus Vorjahr</div></div>
        <div class="uk-item"><div class="uk-val">${genommen}</div><div class="uk-lbl">Genommen</div></div>
        <div class="uk-item" style="background:#eff6ff"><div class="uk-val" style="color:#1d4ed8">${offen}</div><div class="uk-lbl" style="color:#1d4ed8">Noch offen</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr">Urlaub beantragen</div>
      <div class="form-row">
        <label class="form-lbl">Von</label>
        <input type="date" class="form-inp" id="ulVon" oninput="updAT()">
      </div>
      <div class="form-row">
        <label class="form-lbl">Bis</label>
        <input type="date" class="form-inp" id="ulBis" oninput="updAT()">
      </div>
      <div class="arb-hint" id="arbHint"></div>
      <div class="form-row" style="margin-top:12px">
        <label class="form-lbl">Notiz (optional)</label>
        <textarea class="form-inp" id="ulNotiz" placeholder="z.B. Familienurlaub…" rows="2"></textarea>
      </div>
      <button class="btn-main" id="ulBtn" onclick="submitUrlaub()" disabled>Urlaub beantragen</button>
    </div>
    ${_urlaubList.length?`
    <div class="card">
      <div class="card-hdr">Meine Anträge</div>
      ${_urlaubList.map(u=>`
        <div class="ur-row">
          <div>
            <div class="ur-dates">${fmtDate(u.von_datum)} – ${fmtDate(u.bis_datum)}</div>
            <div class="ur-tage">${u.arbeitstage} Arbeitstag${u.arbeitstage!==1?'e':''}${u.jahr?` · ${u.jahr}`:''}</div>
            ${u.notiz?`<div class="ur-notiz">${esc(u.notiz)}</div>`:''}
          </div>
          <span class="badge b-${u.status}">${statusMap[u.status]||u.status}</span>
        </div>`).join('')}
    </div>`:''}`;
}

function updAT(){
  const von=document.getElementById('ulVon')?.value;
  const bis=document.getElementById('ulBis')?.value;
  const hint=document.getElementById('arbHint');
  const btn=document.getElementById('ulBtn');
  if(von&&bis){
    const t=calcAT(von,bis);
    if(t>0){hint.textContent=`${t} Arbeitstag${t!==1?'e':''} (Mo–Fr)`;hint.className='arb-hint ok';hint.style.display='block';btn.disabled=false;}
    else{hint.textContent='Ungültiger Zeitraum';hint.className='arb-hint err';hint.style.display='block';btn.disabled=true;}
  } else {hint.style.display='none';btn.disabled=true;}
}

async function submitUrlaub(){
  const von=document.getElementById('ulVon')?.value;
  const bis=document.getElementById('ulBis')?.value;
  const notiz=(document.getElementById('ulNotiz')?.value||'').trim();
  const at=calcAT(von,bis);
  if(!von||!bis||at<1){toast('Bitte Zeitraum prüfen');return;}
  const yr=new Date(von+'T00:00:00').getFullYear();
  const btn=document.getElementById('ulBtn');btn.disabled=true;btn.textContent='Wird eingereicht…';
  const{data,error}=await _sb.from('urlaub').insert({mitarbeiter_id:_ma.id,von_datum:von,bis_datum:bis,arbeitstage:at,notiz,jahr:yr,status:'beantragt'}).select().single();
  if(error){toast('Fehler: '+error.message);btn.disabled=false;btn.textContent='Urlaub beantragen';return;}
  _urlaubList.unshift(data);
  const sent=await sendEmail(von,bis,at,notiz);
  if(sent)await _sb.from('urlaub').update({email_gesendet:true}).eq('id',data.id);
  toast('Antrag eingereicht'+(sent?' — Chef wurde informiert ✉':''));
  renderUrlaub();
}

async function sendEmail(von,bis,at,notiz){
  const s=_einst.emailjs_service_id,t=_einst.emailjs_template_id,p=_einst.emailjs_public_key,m=_einst.manager_email;
  if(!s||!t||!p||!m)return false;
  try{
    emailjs.init(String(p));
    await emailjs.send(String(s),String(t),{to_email:String(m),ma_name:_ma.name,von_datum:fmtDate(von),bis_datum:fmtDate(bis),arbeitstage:at,notiz:notiz||'–'});
    return true;
  }catch(e){console.error('EmailJS:',e);return false;}
}

// ─── UTILS ───────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,dur=2600){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),dur);
}

init();
</script>
</body>
</html>
